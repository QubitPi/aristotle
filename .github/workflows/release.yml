name: Release

on:
  push:
    branches:
      - master

jobs:
  build:
    uses: ./.github/workflows/build.yml
    secrets: inherit

  publish:
    name: Publish
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-java@v3
        with:
          java-version: '8'
          distribution: 'adopt'
      - name: Generate settings.xml
        uses: whelk-io/maven-settings-xml-action@v20
        with:
          repositories: >
            [
              {
                "id": "download-from-github-qubitpi",
                "name": "Owner",
                "url": "https://maven.pkg.github.com/qubitpi/owner",
                "releases": {
                  "enabled": "true"
                },
                "snapshots": {
                  "enabled": "false"
                }
              },
              {
                "id": "github",
                "url": "https://maven.pkg.github.com/qubitpi/aristotle",
                "releases": {
                  "enabled": "true"
                },
                "snapshots": {
                  "enabled": "false"
                }
              }
            ]
          servers: >
            [
              {
                "id": "download-from-github-qubitpi",
                "username": "anybody",
                "password": "${{ secrets.DOWNLOAD_FROM_GITHUB_QUBITPI }}"
              },
              {
                "id": "github",
                "username": "QubitPi",
                "password": "${{ secrets.PUBLISH_TO_ARTIFACTORY }}"
              }
            ]
      - name: Publish Package to GitHub Packages
        run: mvn --batch-mode deploy
        env:
          GITHUB_TOKEN: ${{ secrets.PUBLISH_TO_ARTIFACTORY }}
