name: Release

on:
  push:
    branches:
      - master

jobs:
  build:
    uses: ./.github/workflows/build.yml
    secrets: inherit

  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-java@v3
        with:
          java-version: '8'
          distribution: 'adopt'
      - name: Generate settings.xml
        uses: whelk-io/maven-settings-xml-action@v20
        with:
          repositories: '[{ "id": "download-from-github-qubitpi", "url": "https://maven.pkg.github.com/qubitpi/athena" }]'
          servers: '[{"id": "download-from-github-qubitpi", "username": "anybody", "password": "${{ secrets.DOWNLOAD_FROM_GITHUB_ARTIFACTORY }}"}]'
      - name: Publish Package to GitHub Packages
        run: mvn --batch-mode deploy
        env:
          GITHUB_TOKEN: ${{ secrets.PUBLISH_TO_ARTIFACTORY }}
